spring:
  application:
    name: file-manager-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:18887/file_manager?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 1001
  servlet:
    session:
      timeout: 7d
      cookie:
        http-only: true
        same-site: lax
        name: FILE_MANAGER_SESSION

app:
  encryption:
    key: ${APP_ENCRYPTION_KEY:filemanager12345}
  scripts:
    path: ${APP_SCRIPTS_PATH:/Users/liupeizhi/code_lab/file_manager/scripts}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5183}
  file:
    max-recursion-depth: 20
    path:
      max-length: 4096
      max-depth: 50